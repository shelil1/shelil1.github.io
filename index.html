<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI 情感樹洞 🌸</title>
    <style>
        body { margin: 0; padding: 20px; min-height: 100vh; background: linear-gradient(135deg, #fff5f5 0%, #ffd1dc 100%); font-family: sans-serif; display: flex; align-items: center; justify-content: center; }
        .container { width: 90%; max-width: 400px; background: rgba(255,255,255,0.8); padding: 30px; border-radius: 25px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); backdrop-filter: blur(10px); }
        h1 { color: #ff8fab; }
        textarea { width: 100%; height: 100px; margin-bottom: 15px; border-radius: 15px; border: 2px solid #ffd1dc; padding: 10px; box-sizing: border-box; outline: none; }
        button { background: #ff8fab; color: white; border: none; padding: 12px; border-radius: 20px; width: 100%; cursor: pointer; font-weight: bold; }
        #response { margin-top: 20px; text-align: left; color: #8b5e66; background: white; padding: 15px; border-radius: 15px; display: none; border-left: 5px solid #ff8fab; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌸 匿名 AI 樹洞</h1>
        <p style="color: #8b5e66; font-size: 0.9rem;">寫下心事，AI 會在這裡陪著你。</p>
        <textarea id="userInput" placeholder="今天心情還好嗎？"></textarea>
        <button id="sendBtn" onclick="askAI()">傳送給樹洞 ✨</button>
        <div id="response"></div>
    </div>

    <script>
    async function askAI() {
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        const respDiv = document.getElementById('response');
        const API_KEY = "AIzaSyBf9OWj5n9NGQupxod9dwJ5Lx_kJ-IO1rs";

        if (!input.value.trim()) { alert("請寫點東西吧！"); return; }

        btn.disabled = true;
        btn.innerText = "正在傾聽...";
        respDiv.style.display = "block";
        respDiv.innerText = "（正在溫柔地思考回覆...）";

        try {
            // 使用最穩定的 v1 版本網址
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "你是一個溫柔的傾聽者，請用簡短、療癒的話回覆，大約 60 字內，使用繁體中文：" + input.value }] }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                respDiv.innerText = data.candidates[0].content.parts[0].text;
                input.value = ""; 
            } else {
                respDiv.innerText = "樹洞通知：模型暫時忙碌，請稍後再試。";
            }
        } catch (error) {
            respDiv.innerText = "連線失敗，請檢查網路。";
        } finally {
            btn.disabled = false;
            btn.innerText = "再傳送一段話 ✨";
        }
    }
    </script>
</body>
</html>
