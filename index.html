<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shelil1's World</title>
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(135deg, #fff5f5 0%, #ffd1dc 100%); 
            font-family: -apple-system, sans-serif;
        }
        .card { 
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px);
            padding: 3rem; border-radius: 40px; text-align: center;
            box-shadow: 0 20px 40px rgba(255, 182, 193, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        h1 { color: #ff8fab; margin-bottom: 20px; }
        
        /* 這是那個可以點的按鈕 */
        .magic-button {
            background: #ff8fab; color: white; border: none;
            padding: 15px 30px; border-radius: 25px; font-size: 1.1rem;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(255, 143, 171, 0.4);
        }
        .magic-button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="card">
        <h1>🌸 Shelil1</h1>
        <p>點擊下方的按鈕看看吧！</p>
        <br>
        <button class="magic-button" onclick="showSurprise()">點開驚喜 ✨</button>
    </div>

    <script>
        // 這是讓網頁「動起來」的魔法 (JavaScript)
        function showSurprise() {
            alert("✨ 恭喜你發現了驚喜！\n\n這是你的專屬網頁空間，\n想寫什麼都可以喔！💗");
        }
    </script>

</body>
</html>
