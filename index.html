<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI 情感樹洞 🌸</title>
    <style>
        body { 
            margin: 0; padding: 20px; min-height: 100vh; 
            background: linear-gradient(135deg, #fff5f5 0%, #ffd1dc 100%); 
            font-family: sans-serif; display: flex; align-items: center; justify-content: center; 
        }
        .container { 
            width: 95%; max-width: 420px; background: rgba(255, 255, 255, 0.8); 
            padding: 30px; border-radius: 30px; text-align: center; 
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.3); backdrop-filter: blur(10px);
            border: 1px solid white;
        }
        h1 { color: #ff8fab; margin-bottom: 20px; }
        textarea { 
            width: 100%; height: 120px; margin-bottom: 15px; border-radius: 15px; 
            border: 2px solid #ffd1dc; padding: 15px; box-sizing: border-box; 
            outline: none; font-size: 1rem; color: #8b5e66; resize: none;
        }
        button { 
            background: #ff8fab; color: white; border: none; padding: 12px; 
            border-radius: 25px; width: 100%; cursor: pointer; font-weight: bold; 
            font-size: 1rem; transition: 0.3s;
        }
        button:disabled { background: #ffc2d1; cursor: not-allowed; }
        #response { 
            margin-top: 25px; text-align: left; color: #8b5e66; background: white; 
            padding: 15px; border-radius: 15px; display: none; 
            border-left: 5px solid #ff8fab; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            line-height: 1.6; white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌸 匿名 AI 樹洞</h1>
        <p style="color: #8b5e66; font-size: 0.9rem; margin-bottom: 15px;">寫下心事，AI 會在這裡陪著你。</p>
        <textarea id="userInput" placeholder="今天心情還好嗎？"></textarea>
        <button id="sendBtn" onclick="askAI()">傳送給樹洞 ✨</button>
        <div id="response"></div>
        <button id="resetBtn" onclick="resetKey()" style="margin-top:15px; background:none; color:#8b5e66; font-size:0.7rem; border:none; text-decoration:underline; width:auto;">更換密鑰</button>
    </div>

    <script>
    // 1. 初始化金鑰
    function getApiKey() {
        let key = localStorage.getItem("my_ai_key");
        if (!key || key.length < 10) {
            key = prompt("請輸入通關密語 (你的 Google API Key)：");
            if (key) {
                localStorage.setItem("my_ai_key", key);
            }
        }
        return key;
    }

    function resetKey() {
        localStorage.removeItem("my_ai_key");
        alert("已清除密鑰，請重新整理網頁。");
        location.reload();
    }

    async function askAI() {
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        const respDiv = document.getElementById('response');
        
        // 取得金鑰
        const currentKey = getApiKey();
        if (!currentKey) { alert("沒有密鑰無法使用喔！"); return; }
        if (!input.value.trim()) { alert("請寫點東西吧！"); return; }

        btn.disabled = true;
        btn.innerText = "正在傾聽...";
        respDiv.style.display = "block";
        respDiv.innerText = "（正在溫柔地思考回覆...）";

        try {
            // 使用正確的金鑰變數 currentKey
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${currentKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [{ text: "你是一個溫柔的傾聽者，請用簡短、療癒的話回覆這段情緒，大約 60 字內，使用繁體中文：" + input.value }] 
                    }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                respDiv.innerText = data.candidates[0].content.parts[0].text;
                input.value = ""; 
            } else {
                const errorInfo = data.error ? (data.error.message) : "密鑰可能錯誤，請點下方更換密鑰重試。";
                respDiv.innerText = "樹洞提醒：\n" + errorInfo;
            }
        } catch (error) {
            respDiv.innerText = "連線失敗，請檢查網路或金鑰是否正確。";
        } finally {
            btn.disabled = false;
            btn.innerText = "再傳送一段話 ✨";
        }
    }
    </script>
</body>
</html>
