<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI 情感樹洞 🌸</title>
    <style>
        body { 
            margin: 0; padding: 20px; min-height: 100vh;
            background: linear-gradient(135deg, #fff5f5 0%, #ffd1dc 100%); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .container {
            width: 90%; max-width: 450px;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px);
            padding: 30px; border-radius: 30px; border: 1px solid white;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.3);
            text-align: center;
        }
        h1 { color: #ff8fab; font-size: 1.6rem; margin-bottom: 20px; }
        textarea {
            width: 100%; height: 120px; border: 2px solid #ffd1dc;
            border-radius: 15px; padding: 15px; font-size: 1rem;
            margin-bottom: 15px; outline: none; box-sizing: border-box;
            background: rgba(255, 255, 255, 0.5); color: #8b5e66; resize: none;
        }
        button {
            background: #ff8fab; color: white; border: none;
            padding: 12px 30px; border-radius: 25px; font-weight: bold;
            cursor: pointer; width: 100%; transition: 0.3s; font-size: 1rem;
        }
        button:hover { background: #ff7597; transform: translateY(-2px); }
        #response {
            margin-top: 25px; padding: 15px; border-radius: 15px;
            background: white; color: #8b5e66; text-align: left;
            font-size: 0.95rem; line-height: 1.6; display: none;
            border-left: 5px solid #ff8fab; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌸 匿名情感樹洞</h1>
        <p style="color: #8b5e66; font-size: 0.9rem; margin-bottom: 15px;">這裡是妳專屬的空間，寫下任何心事吧。</p>
        
        <textarea id="userInput" placeholder="今天心情還好嗎？"></textarea>
        <button id="sendBtn" onclick="sendToHole()">傳送給樹洞 ✨</button>
        
        <div id="response"></div>
    </div>

    <script>
        // 預設的暖心回覆資料庫
        const healingMessages = [
            "辛苦了，妳已經做得很棒了。抱一個吧！🌸",
            "不管今天發生什麼事，妳都值得被溫柔對待。",
            "有些時候，停下來休息一下也沒關係的，妳不孤單。",
            "樹洞收到了妳的情緒，它們在這裡很安全，妳可以安心放下囉。",
            "即使是很微小的進步，也值得為自己感到驕傲。✨",
            "明天的太陽會升起，壞心情也會跟著雲朵飄散的。",
            "妳不需要隨時都表現得很完美，真實的妳就很迷人。",
            "深呼吸，感受當下的平靜，這世界還有一角在默默愛著妳。",
            "把烦惱留給樹洞，明天醒來又是新的一頁。🍂",
            "聽見妳的心聲了，願這點微光能帶給妳一點點安慰。"
        ];

        function sendToHole() {
            const input = document.getElementById('userInput');
            const respDiv = document.getElementById('response');
            
            if (!input.value.trim()) {
                alert("請寫點東西吧！");
                return;
            }

            // 模擬思考的感覺
            respDiv.style.display = "block";
            respDiv.innerText = "（樹洞正在靜靜傾聽...）";

            setTimeout(() => {
                // 隨機挑選一句話
                const randomIndex = Math.floor(Math.random() * healingMessages.length);
                const reply = healingMessages[randomIndex];
                
                respDiv.innerText = reply;
                input.value = ""; // 清空輸入框
            }, 800); // 延遲 0.8 秒增加真實感
        }
    </script>
</body>
</html>
