<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>匿名樹洞 🌸</title>
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(135deg, #fff5f5 0%, #ffd1dc 100%); 
            font-family: -apple-system, sans-serif;
        }
        .card { 
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px);
            padding: 3rem; border-radius: 40px; text-align: center;
            box-shadow: 0 20px 40px rgba(255, 182, 193, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-width: 350px;
        }
        h1 { color: #ff8fab; font-size: 1.8rem; }
        p { color: #8b5e66; line-height: 1.6; margin-bottom: 25px; }
        
        .submit-btn {
            display: inline-block;
            background: #ff8fab; color: white; text-decoration: none;
            padding: 15px 40px; border-radius: 30px; font-weight: bold;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 143, 171, 0.4);
        }
        .submit-btn:hover { background: #ff7597; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="card">
        <h1>🌙 匿名樹洞</h1>
        <p>在這裡，你可以安全地放下所有情緒。<br>沒人知道你是誰，儘管說吧。</p>
        
        <a href="你的Google表單網址" class="submit-btn">點我匿名投遞 ✉️</a>
        
        <p style="font-size: 0.8rem; margin-top: 20px; opacity: 0.6;">所有的秘密都會被溫柔對待</p>
    </div>

</body>
</html>
