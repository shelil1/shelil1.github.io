    <script>
    // 你的 API Key 已經放在這裡了
    const API_KEY = "AIzaSyBf9OWj5n9NGQupxod9dwJ5Lx_kJ-IO1rs"; 

    async function askAI() {
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        const respDiv = document.getElementById('response');
        
        if (!input.value.trim()) {
            alert("請寫點東西吧！");
            return;
        }

        // 開始動畫與狀態
        btn.disabled = true;
        btn.innerText = "AI 正在傾聽...";
        respDiv.style.display = "block";
        respDiv.innerText = "（正在溫柔地思考回覆...）";

        try {
            const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [{ 
                            text: "你是一個溫柔的傾聽者，請用簡短、療癒、溫暖的話回覆這段情緒，大約 60 字內，並使用繁體中文：" + input.value 
                        }] 
                    }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                respDiv.innerText = data.candidates[0].content.parts[0].text;
                input.value = ""; 
            } else {
                // 如果 API 有回傳但內容不對，顯示錯誤代碼
                respDiv.innerText = "樹洞暫時收不到訊號。詳細原因：" + JSON.stringify(data.error || "未知權限問題");
            }
        } catch (error) {
            // 如果連線失敗，會跳出視窗
            alert("連線發生問題：" + error.message);
        } finally {
            // 無論成功或失敗，最後都要把按鈕恢復
            btn.disabled = false;
            btn.innerText = "再傳送一段話 ✨";
        }
    }
    </script>
