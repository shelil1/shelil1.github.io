<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>匿名抒發空間 🌸</title>
    <style>
        body { 
            margin: 0; padding: 20px; min-height: 100vh;
            background: linear-gradient(135deg, #fff5f5 0%, #ffd1dc 100%); 
            font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }
        .header { 
            text-align: center; margin-bottom: 30px; padding: 20px;
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(5px);
            border-radius: 20px; width: 100%; max-width: 500px;
        }
        h1 { color: #ff8fab; margin: 0; font-size: 1.5rem; }
        p { color: #8b5e66; font-size: 0.9rem; }

        /* 留言板容器 */
        .comment-box {
            width: 100%; max-width: 600px;
            background: rgba(255, 255, 255, 0.7);
            padding: 20px; border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.2);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌸 匿名樹洞</h1>
        <p>在這裡寫下你的心情，沒人知道你是誰。</p>
    </div>

    <div class="comment-box">
        <div id="disqus_thread"></div>
        <script>
            var disqus_config = function () {
                this.page.url = window.location.href;
                this.page.identifier = 'shelil1_secret_hole'; 
            };
            (function() { 
                var d = document, s = d.createElement('script');
                s.src = 'https://short-comments.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            })();
        </script>
    </div>

    <p style="margin-top: 30px; color: #ff8fab; font-size: 0.8rem;">✨ 溫柔對待每一個情緒</p>

</body>
</html>
