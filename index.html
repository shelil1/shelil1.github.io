<script>
    // 請確保這裡的引號是英文直直的 "
    const API_KEY = "AIzaSyDQE5CrgAECK_HreQaQPpTexrQAIDmyqmw"; 

    async function askAI() {
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        const respDiv = document.getElementById('response');
        
        // 1. 檢查有沒有輸入文字
        if (!input.value.trim()) {
            alert("請寫點東西吧！");
            return;
        }

        // 2. 顯示正在載入的狀態
        btn.disabled = true;
        btn.innerText = "AI 正在傾聽...";
        respDiv.style.display = "block";
        respDiv.innerText = "（正在溫柔地思考回覆...）";

        try {
            // 3. 呼叫 Google AI
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "你是一個溫柔的傾聽者，請用簡短、療癒、溫暖的話回覆這段情緒，大約 50 字內，並使用繁體中文：" + input.value }] }]
                })
            });

            const data = await response.json();
            
            // 4. 檢查 AI 是否有成功回傳
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const aiText = data.candidates[0].content.parts[0].text;
                respDiv.innerText = aiText;
                input.value = ""; // 成功後清空輸入框
            } else {
                respDiv.innerText = "樹洞收訊不好，請再試一次。";
            }
        } catch (error) {
            console.error(error);
            respDiv.innerText = "連線失敗，請檢查 API Key 或網路。";
        } finally {
            btn.disabled = false;
            btn.innerText = "再傳送一段話 ✨";
        }
    }
</script>
