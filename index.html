<script>
    // 你的 API Key
    const API_KEY = "AIzaSyBf9OWj5n9NGQupxod9dwJ5Lx_kJ-IO1rs"; 

    async function askAI() {
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        const respDiv = document.getElementById('response');
        const userText = input.value.trim();
        
        if (!userText) { alert("請寫點東西吧！"); return; }

        btn.disabled = true;
        btn.innerText = "AI 正在傾聽...";
        respDiv.style.display = "block";
        respDiv.innerText = "（正在溫柔地思考回覆...）";

        try {
            // 這是目前最正確、最官方的模型路徑
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "你是一個溫柔的傾聽者，請用簡短、療癒、溫暖的話回覆這段情緒，大約 60 字內，並使用繁體中文：" + userText }] }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                respDiv.innerText = data.candidates[0].content.parts[0].text;
                input.value = ""; 
            } else {
                // 如果還是失敗，直接顯示完整錯誤，我來幫你判斷
                respDiv.innerText = "抱歉，樹洞遇到了點小麻煩。原因：" + (data.error ? data.error.message : "請檢查 Key 狀態");
                console.log(data);
            }
        } catch (error) {
            respDiv.innerText = "連線失敗：" + error.message;
        } finally {
            btn.disabled = false;
            btn.innerText = "再傳送一段話 ✨";
        }
    }
</script>
