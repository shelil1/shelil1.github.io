<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI 情感樹洞 🌸</title>
    <style>
        body { margin: 0; padding: 20px; min-height: 100vh; background: linear-gradient(135deg, #fff5f5 0%, #ffd1dc 100%); font-family: sans-serif; display: flex; align-items: center; justify-content: center; }
        .container { width: 95%; max-width: 420px; background: rgba(255, 255, 255, 0.85); padding: 30px; border-radius: 30px; text-align: center; box-shadow: 0 15px 35px rgba(255, 182, 193, 0.3); backdrop-filter: blur(10px); border: 1px solid white; }
        h1 { color: #ff8fab; margin-bottom: 20px; font-size: 1.6rem; }
        textarea { width: 100%; height: 120px; margin-bottom: 15px; border-radius: 15px; border: 2px solid #ffd1dc; padding: 15px; box-sizing: border-box; outline: none; font-size: 1rem; color: #8b5e66; resize: none; background: white; }
        button { background: #ff8fab; color: white; border: none; padding: 12px; border-radius: 25px; width: 100%; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        button:disabled { background: #ffc2d1; cursor: not-allowed; }
        #response { margin-top: 25px; text-align: left; color: #8b5e66; background: white; padding: 15px; border-radius: 15px; display: none; border-left: 5px solid #ff8fab; box-shadow: 0 5px 15px rgba(0,0,0,0.05); line-height: 1.6; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌸 匿名 AI 樹洞</h1>
        <p style="color: #8b5e66; font-size: 0.9rem; margin-bottom: 15px;">寫下心事，AI 會在這裡陪著你。</p>
        <textarea id="userInput" placeholder="今天心情還好嗎？"></textarea>
        <button id="sendBtn" onclick="askAI()">傳送給樹洞 ✨</button>
        <div id="response"></div>
    </div>

    <script>
    async function askAI() {
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        const respDiv = document.getElementById('response');
        
        // 妳的 Tier 1 正確 Key
        const API_KEY = "AIzaSyBf9OWj5n9NGQupxod9dwJ5Lx_kJ-IO1rs";

        if (!input.value.trim()) { alert("請寫點東西吧！"); return; }

        btn.disabled = true;
        btn.innerText = "正在傾聽...";
        respDiv.style.display = "block";
        respDiv.innerText = "（正在溫柔地思考回覆...）";

        try {
            // 【終極網址修正】針對 Tier 1 帳戶，使用 v1 版本並加上正確的模型全名
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [{ text: "你是一個溫柔的傾聽者，請用繁體中文回覆這段心事，大約 60 字內，語氣要溫暖且有同理心：" + input.value }] 
                    }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                respDiv.innerText = data.candidates[0].content.parts[0].text;
                input.value = ""; 
            } else {
                // 如果失敗，清楚顯示 Google 的回報，幫助我們判斷
                const msg = data.error ? (data.error.status + ": " + data.error.message) : "暫時無法讀取回覆";
                respDiv.innerText = "樹洞通知：\n" + msg;
            }
        } catch (error) {
            respDiv.innerText = "網路連線失敗，請檢查網路連線。";
        } finally {
            btn.disabled = false;
            btn.innerText = "再傳送一段話 ✨";
        }
    }
    </script>
</body>
</html>
